<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Returning Medicaid Applicant Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="../style/mainStyles.css" rel="stylesheet"/>
    <style>
        .error-message {
            color: #cc0000;
            font-size: 13px;
            font-weight: 700;
            min-height: 16px;
            margin-top: -8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
<!-- Header -->
<div class="top-header">
    <!-- Logo Source: -->
    <div class="logo"><img alt="Image courtesy of Missouri Department of Social Services."
                           src="../img/missouriDSSLogo.png"></div>

    <div class="top-links">
        <a class="top-link" href="https://dss.mo.gov">DSS</a>
        <a class="top-link" href="https://mo.gov">mo.gov</a>
        <a class="top-link" href="#">Governor Kehoe</a>
        <a class="top-link" href="#">Find an Agency</a>
        <a class="top-link" href="#">Online Services</a>
    </div>
</div>

<!-- Navigation -->
<div class="nav-bar">
    <span>About</span>
    <span>Divisions</span>
    <span>Services</span>
    <span>Public Data</span>
    <span>Providers</span>
    <span>Contact Us</span>
</div>

<!-- Main Section -->
<div class="container">
    <h2>Returning Medicaid Applicant Login</h2>
    <p>Enter your account details to access MO HealthVerify.</p>

    <div class="form-box">
        <form id="loginForm">
            <label for="username">Username (Email Address)</label>
            <input id="username" required type="text"/>
            <div class="error-message" id="usernameError"></div>

            <label for="password">Password
                <span class="show-link" onclick="togglePassword('password')"
                >Show Password</span>
            </label>
            <input id="password" maxlength="64" minlength="8" required type="password"/>
            <div class="error-message" id="passwordError"></div>

            <div class="checkbox">
                <label class="checkbox-label" for="rememberMe">
                    <input id="rememberMe" type="checkbox"/>
                    Keep me signed in
                </label>
            </div>

            <button disabled id="signInButton" type="submit">Sign In</button>
        </form>

        <p style="margin-top: 16px; font-size: 14px;">
            <a href="#">Forgot password?</a><br/>
            Don't have an account yet? <a href="user-registration.html">Register here!</a>
        </p>
    </div>
</div>

<script src="../scripts/form-validation-login.js"></script>
</body>
</html>
